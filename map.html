<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map — OpenBookMap</title>
    <meta
      name="description"
      content="A global map of used bookstores, with searchable inventories."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header data-topbar></header>

    <div class="searchbar">
      <input type="text" id="search-input" placeholder="Search a city…" />
      <button id="search-btn">Go</button>
      <span class="meta" id="shop-count">search a city to begin</span>
    </div>

    <div id="map"></div>
    <div class="loading-pill" id="loading">Loading bookstores…</div>

    <aside class="panel" id="panel">
      <button class="close" id="panel-close" aria-label="Close panel">×</button>
      <div class="panel-inner" id="panel-inner"></div>
    </aside>

    <script type="module" src="/src/pages/map.js"></script>
  </body>
</html>
