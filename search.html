<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search — OpenBookMap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800&display=swap"
      rel="stylesheet"
    />
    <style>
      .page-wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: calc(var(--topbar-height) + 28px) 24px 40px;
      }
      .page-wrap .card {
        margin-bottom: 20px;
      }
      form.search-form {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }
      form.search-form input {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <header data-topbar></header>
    <div class="page-wrap">
      <h1 style="font-size: 32px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 20px">
        Search
      </h1>
      <form class="search-form" id="search-form">
        <input
          id="search-q"
          class="input"
          type="search"
          placeholder="Search shops or book titles…"
          autofocus
        />
        <button type="submit" class="btn stamp">Search</button>
      </form>
      <div id="results"></div>
    </div>
    <footer data-footer></footer>
    <script type="module" src="/src/pages/search.js"></script>
  </body>
</html>
